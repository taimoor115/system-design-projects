server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: warn

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: api-local-file
    static_configs:
      - targets: [localhost]
        labels:
          job: multilingual-tales-api
          service: multilingual-tales-api
          __path__: /var/log/multilingual-tales/api/*.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            message: message
            traceId: traceId
            userId: userId
            context: context
      - labels:
          level:
      - structured_metadata:
          traceId:
          userId:
          context:

  - job_name: docker-containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Keep only containers that have the compose service label
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        action: keep
        regex: .+
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label: service
      - source_labels: [__meta_docker_container_name]
        regex: '/?(.*)'
        target_label: container
      - source_labels: [__meta_docker_container_label_com_docker_compose_project]
        target_label: project
      - replacement: docker-containers
        target_label: job
    pipeline_stages:
      # Strip Docker log metadata wrapper (timestamps, stream type prefix)
      - docker: {}
      # Parse JSON log lines emitted by Winston
      - json:
          expressions:
            level: level
            message: message
            traceId: traceId
            userId: userId
      # Promote only low-cardinality field as Loki label
      - labels:
          level:
      # Store traceId/userId as structured metadata (Loki 2.9+ feature)
      - structured_metadata:
          traceId:
          userId:
